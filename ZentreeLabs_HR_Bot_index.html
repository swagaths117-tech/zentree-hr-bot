<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentree Labs HR Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222636; --border: #2e3348;
    --accent: #6c8ef5; --accent2: #a78bfa; --green: #34d399; --text: #e8eaf6;
    --muted: #8892b0; --user-bubble: #1e3a5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .avatar { width: 42px; height: 42px; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .header-info h1 { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--text); }
  .header-info p { font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 4px; }
  .header-info p::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-right { margin-left: auto; font-size: 11px; color: var(--muted); text-align: right; line-height: 1.5; }
  .chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg { display: flex; gap: 10px; max-width: 88%; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { margin-left: auto; flex-direction: row-reverse; }
  .msg-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 2px; overflow: hidden; }
  .msg.bot .msg-icon { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.bot .msg-icon img { width: 100%; height: 100%; object-fit: cover; }
  .msg.user .msg-icon { background: var(--surface2); }
  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; max-width: 100%; }
  .msg.bot .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); border: 1px solid #2a4a7f; border-top-right-radius: 4px; }
  .bubble b { color: var(--accent); }
  .bubble .tag { display: inline-block; background: rgba(108,142,245,0.12); color: var(--accent); border: 1px solid rgba(108,142,245,0.25); border-radius: 20px; padding: 2px 10px; font-size: 12px; margin: 2px; }
  .contact-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-top: 10px; display: flex; align-items: center; gap: 12px; }
  .contact-avatar { width: 36px; height: 36px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .contact-info { font-size: 13px; line-height: 1.7; }
  .contact-info strong { color: var(--text); display: block; }
  .contact-info a { color: var(--accent); text-decoration: none; }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 8px; flex-shrink: 0; }
  .qr-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 13px; font-family: 'DM Sans',sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .qr-btn:hover { background: rgba(108,142,245,0.15); border-color: var(--accent); color: var(--accent); }
  .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 14px; padding: 12px 16px; resize: none; outline: none; max-height: 100px; min-height: 44px; line-height: 1.5; transition: border-color 0.2s; }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }
  .send-btn { width: 44px; height: 44px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; border-radius: 12px; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
  .send-btn:hover { opacity: 0.85; }
  .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip { background: rgba(108,142,245,0.1); border: 1px solid rgba(108,142,245,0.25); color: var(--accent); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .chip:hover { background: rgba(108,142,245,0.2); }
  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:999; align-items:center; justify-content:center; padding:16px; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; width:100%; max-width:420px; animation:fadeUp 0.3s ease; }
  .modal-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .modal-title { font-weight:600; font-size:15px; }
  .modal-sub { font-size:12px; color:var(--green); }
  .modal-close { margin-left:auto; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }
  .modal-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; padding:10px 14px; margin-bottom:10px; outline:none; }
  .modal-input:focus { border-color:var(--accent); }
  .modal-btns { display:flex; gap:10px; margin-top:14px; }
  .btn-email { flex:1; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:white; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; padding:12px; cursor:pointer; }
  .btn-wa { flex:1; background:linear-gradient(135deg,#25d366,#128c7e); border:none; border-radius:12px; color:white; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; padding:12px; cursor:pointer; }
  .typing .bubble { padding:14px 18px; }
  .dots { display:flex; gap:4px; }
  .dots span { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:bounce 1.2s infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  .section-label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; margin-top:8px; }
  .info-row { display:flex; gap:8px; margin:4px 0; font-size:13px; }
  .info-row .label { color:var(--muted); min-width:110px; }
  .holiday-table { width:100%; border-collapse:collapse; margin-top:8px; font-size:13px; }
  .holiday-table th { background:rgba(108,142,245,0.15); color:var(--accent); padding:6px 10px; text-align:left; font-weight:600; }
  .holiday-table td { padding:6px 10px; border-bottom:1px solid var(--border); }
  .holiday-table tr:last-child td { border-bottom:none; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar"><img src="https://i.ibb.co/placeholder/zentree.png" id="logoImg" onerror="this.parentElement.innerHTML='🌿';this.parentElement.style.background='linear-gradient(135deg,#6c8ef5,#a78bfa)';this.parentElement.style.display='flex';this.parentElement.style.alignItems='center';this.parentElement.style.justifyContent='center';this.parentElement.style.fontSize='20px';" /></div>
  <div class="header-info">
    <h1>Zentree Labs HR Assistant</h1>
    <p>Always available for you</p>
  </div>
  <div class="header-right">Zara · HR Bot<br><span style="color:var(--muted)">Zentree Labs</span></div>
</div>

<div class="chat-area" id="chatArea"></div>
<div class="quick-replies" id="quickReplies"></div>
<div class="input-area">
  <textarea id="userInput" placeholder="Type your question here..." rows="1"></textarea>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<!-- Concern Modal -->
<div class="modal-overlay" id="concernModal">
  <div class="modal-box">
    <div class="modal-header">
      <div style="width:38px;height:38px;background:linear-gradient(135deg,#6c8ef5,#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🔒</div>
      <div><div class="modal-title">Share a Concern with HR</div><div class="modal-sub">Completely confidential</div></div>
      <button class="modal-close" onclick="closeConcernModal()">✕</button>
    </div>
    <input id="concernName" class="modal-input" type="text" placeholder="Your full name" />
    <textarea id="concernMsg" class="modal-input" placeholder="Write your concern or message..." rows="4" style="resize:none;"></textarea>
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Choose how to reach Swagath:</div>
    <div class="modal-btns">
      <button class="btn-email" onclick="sendConcernEmail()">✉️ Send Email</button>
      <button class="btn-wa" onclick="sendConcernWhatsApp()">💬 WhatsApp</button>
    </div>
  </div>
</div>

function setQR(arr) {
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  arr.forEach(r => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = r;
    b.onclick = () => { document.getElementById('userInput').value = r; sendMessage(); };
    qr.appendChild(b);
  });
}

function addMsg(role, html, isHTML = false) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  if (role === 'bot') { icon.innerHTML = '<img src="' + LOGO_B64 + '" />'; }
  else { icon.textContent = '👤'; }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHTML) bubble.innerHTML = html;
  else bubble.innerHTML = html.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
  wrap.appendChild(icon); wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const t = document.createElement('div');
  t.className = 'msg bot'; t.id = 'typing';
  t.innerHTML = '<div class="msg-icon"><img src="' + LOGO_B64 + '" /></div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
  area.appendChild(t); area.scrollTop = area.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function getResponse(input) {
  const txt = input.toLowerCase();

  // Concern keywords
  const concernKeys = ['concern','complaint','feedback','want to say','want to tell','report something','raise issue','speak privately','confidential','problem with manager','team issue'];
  if (concernKeys.some(k => txt.includes(k))) {
    setTimeout(() => showConcernModal(), 400);
    return { html: "I understand you'd like to share something privately with HR. 🙏<br><br>Please fill in the form below — it's completely confidential.", qr: ["🌿 Leave policy","📞 Contact HR","🏥 Insurance","📅 Holidays"] };
  }

  // Greeting
  if (/^(hi|hello|hey|good morning|good afternoon|good evening|namaste|hii|helo)/.test(txt)) {
    return { html: "Hi there! 👋 How can I help you today?<br><br>You can ask me about leaves, holidays, insurance, appraisals, payslips and more!", qr: ["🌿 Leave policy","📅 Apply leave","🏥 Insurance","📞 Contact HR"] };
  }

  // Thank you
  if (/thank|thanks|ok thanks|got it|understood|helpful/.test(txt)) {
    return { html: "You're welcome! 😊 Feel free to ask anytime. I'm always here to help!<br><br>Is there anything else I can assist you with?", qr: ["🌿 Leave policy","📅 Holidays 2026","🏥 Insurance","🔒 Share a concern"] };
  }

  // Leave policy — show both
  if (/leave policy|what is leave|types of leave/.test(txt) && !/aiml|ai\/ml|hr |finance|embedded/.test(txt)) {
    return {
      html: `Which department are you from?<br><br>
<span class="tag" style="cursor:pointer" onclick="document.getElementById('userInput').value='AI/ML leave policy';sendMessage()">🤖 AI/ML</span>
<span class="tag" style="cursor:pointer" onclick="document.getElementById('userInput').value='HR Finance Embedded leave policy';sendMessage()">💼 HR / Finance / Embedded</span>`,
      qr: ["🤖 AI/ML leave policy","💼 HR/Finance/Embedded leave policy","📅 Apply leave","📞 Contact HR"]
    };
  }

  // Holiday — ask city
  if (/^(holiday|holidays|public holiday)/.test(txt) && !/bangalore|blr|hyderabad|hyd/.test(txt)) {
    return {
      html: `Which city are you based in?<br><br>
<span class="tag" style="cursor:pointer" onclick="document.getElementById('userInput').value='Bangalore holidays 2026';sendMessage()">🏙️ Bangalore</span>
<span class="tag" style="cursor:pointer" onclick="document.getElementById('userInput').value='Hyderabad holidays 2026';sendMessage()">🏙️ Hyderabad</span>`,
      qr: ["📅 Bangalore holidays","📅 Hyderabad holidays","🌿 Leave policy","📞 Contact HR"]
    };
  }

  // Match intents
  for (const intent of INTENTS) {
    if (intent.keys.some(k => txt.includes(k))) {
      if (intent.topic && KB[intent.topic]) {
        const item = KB[intent.topic];
        return { title: item.title, html: item.content, qr: item.qr };
      }
    }
  }

  // Fallback
  return {
    html: `I'm not sure I understood that. 😊 Here are some things I can help with:`,
    qr: ["🌿 Leave policy","📅 Apply leave","🏥 Insurance","📈 Appraisal","🗓️ Holidays","📞 Contact HR","🔒 Share a concern"]
  };
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────
function sendMessage() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('quickReplies').innerHTML = '';
  addMsg('user', text, false);

  showTyping();
  setTimeout(() => {
    hideTyping();
    const res = getResponse(text);
    let html = res.html;
    if (res.title) html = '<b style="color:var(--accent);font-size:15px;">' + res.title + '</b><br><br>' + html;
    addMsg('bot', html, true);
    if (res.qr) setQR(res.qr);
  }, 600);
}

// ─── CONCERN MODAL ────────────────────────────────────────────────────────
function showConcernModal() { document.getElementById('concernModal').classList.add('active'); }
function closeConcernModal() {
  document.getElementById('concernModal').classList.remove('active');
  document.getElementById('concernName').value = '';
  document.getElementById('concernMsg').value = '';
}
function sendConcernEmail() {
  const n = document.getElementById('concernName').value.trim();

  if (!n || !m) { alert('Please enter your name and message.'); return; }
  const s = encodeURIComponent('Employee Concern – ' + n);
  const b = encodeURIComponent('Hi Swagath,\n\nName: ' + n + '\n\nMessage:\n' + m + '\n\nSent via Zentree Labs HR Chatbot.');
  window.open('mailto:swagath.s@zentreelabs.com?subject=' + s + '&body=' + b);
  closeConcernModal();
  addMsg('bot', '✅ Your email app has been opened with the message pre-filled. Just press <b>Send</b> to reach Swagath. Your concern is in safe hands. 🙏', true);
  setQR(["🌿 Leave policy","📞 Contact HR","🏥 Insurance","📅 Apply leave"]);
}

// ─── TEXTAREA AUTO RESIZE ─────────────────────────────────────────────────
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';

});
